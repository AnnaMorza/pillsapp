<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pill Reminder - Calendar</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <div class="calendar-container">
      <div class="calendar-header">
        <div class="nav-buttons">
          <button class="nav-btn" id="prev-month"><i class="fas fa-chevron-left"></i></button>
          <button class="nav-btn" id="next-month"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="month-year" id="month-year">September 2025</div>
      </div>
      
      <div class="weekdays">
        <div class="weekday">Sun</div>
        <div class="weekday">Mon</div>
        <div class="weekday">Tue</div>
        <div class="weekday">Wed</div>
        <div class="weekday">Thu</div>
        <div class="weekday">Fri</div>
        <div class="weekday">Sat</div>
      </div>
      
      <div class="days" id="days"></div>
      
      <div class="calendar-footer">
        <button class="today-btn" id="today-btn"><i class="fas fa-calendar-day"></i> Today</button>
        <div class="event-indicator">
          <i class="fas fa-circle" style="color: var(--accent); font-size: 0.6rem;"></i>
          <span>Has pills</span>
        </div>
      </div>
    </div>

    <!-- Event Panel -->
    <div class="event-panel" id="event-panel">
      <div class="event-header">
        <div class="event-date" id="event-date">Select a date</div>
        <i class="fas fa-pills event-icon"></i>
      </div>
      
      <!-- Add Pill Form -->
      <div class="add-pill-form">
        <h3><i class="fas fa-plus-circle"></i> Add New Pill</h3>
        <div class="form-group">
          <input type="text" id="pill-name" placeholder="Pill name" class="form-input">
        </div>
        <div class="form-group">
          <input type="time" id="pill-time" class="form-input">
        </div>
        <div class="form-group">
          <input type="number" id="pill-dosage" placeholder="Dosage (mg)" class="form-input">
        </div>
        <button id="add-pill-btn" class="add-pill-btn">
          <i class="fas fa-save"></i> Add Pill
        </button>
      </div>
      
      <!-- Pills List -->
      <div class="pills-list-header">
        <i class="fas fa-list-ul"></i>
        <span>Pills for selected day</span>
      </div>
      <div class="event-list" id="event-list">
        <div class="no-events">Select a date to add or view pills</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
